global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 0s
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'warning-receiver'
      repeat_interval: 30m

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://vestigia-api:8000/webhooks/siem'
        send_resolved: true

  - name: 'critical-receiver'
    # PagerDuty — replace with real routing key
    # pagerduty_configs:
    #   - routing_key: '<PAGERDUTY_ROUTING_KEY>'
    #     severity: critical
    webhook_configs:
      - url: 'http://vestigia-api:8000/webhooks/siem'
        send_resolved: true
    # Slack — replace with real webhook URL
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/xxx/yyy/zzz'
    #     channel: '#vestigia-critical'
    #     title: '{{ .CommonAnnotations.summary }}'
    #     text: '{{ .CommonAnnotations.description }}'

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://vestigia-api:8000/webhooks/siem'
        send_resolved: true
    # Slack — replace with real webhook URL
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/xxx/yyy/zzz'
    #     channel: '#vestigia-alerts'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
