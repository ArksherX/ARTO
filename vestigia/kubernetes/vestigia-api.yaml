apiVersion: apps/v1
kind: Deployment
metadata:
  name: vestigia-api
  labels:
    app: vestigia-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vestigia-api
  template:
    metadata:
      labels:
        app: vestigia-api
    spec:
      containers:
      - name: api
        image: vestigia/vestigia-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: vestigia-config
        - secretRef:
            name: vestigia-secrets
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vestigia-api
spec:
  selector:
    app: vestigia-api
  ports:
  - port: 80
    targetPort: 8000
