# =============================================================================
# VerityFlux Enterprise - Kubernetes Secrets
# =============================================================================
# 
# IMPORTANT: This file contains placeholder values.
# In production, use one of:
#   1. Kubernetes Secrets with base64 encoded values
#   2. External Secrets Operator with AWS Secrets Manager/Vault/etc.
#   3. Sealed Secrets for GitOps
#
# To create secrets from this template:
#   kubectl create secret generic verityflux-secrets \
#     --from-literal=DATABASE_PASSWORD=<your-password> \
#     --from-literal=JWT_SECRET_KEY=<your-secret> \
#     ...
# =============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: verityflux-secrets
  namespace: verityflux
  labels:
    app.kubernetes.io/name: verityflux
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # ==========================================================================
  # Database
  # ==========================================================================
  DATABASE_URL: "postgresql://verityflux:CHANGE_ME@verityflux-postgres:5432/verityflux"
  POSTGRES_PASSWORD: "CHANGE_ME"
  
  # ==========================================================================
  # Redis
  # ==========================================================================
  REDIS_URL: "redis://verityflux-redis:6379/0"
  
  # ==========================================================================
  # Security / JWT
  # ==========================================================================
  JWT_SECRET_KEY: "CHANGE_ME_USE_A_STRONG_RANDOM_STRING_AT_LEAST_32_CHARS"
  SECRET_KEY: "CHANGE_ME_USE_A_STRONG_RANDOM_STRING"
  ENCRYPTION_KEY: "CHANGE_ME_USE_A_32_BYTE_KEY_FOR_AES256"
  
  # ==========================================================================
  # Stripe (SaaS Mode)
  # ==========================================================================
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  
  # ==========================================================================
  # Slack Integration
  # ==========================================================================
  SLACK_BOT_TOKEN: ""
  SLACK_SIGNING_SECRET: ""
  
  # ==========================================================================
  # Jira Integration
  # ==========================================================================
  JIRA_URL: ""
  JIRA_USERNAME: ""
  JIRA_API_TOKEN: ""
  
  # ==========================================================================
  # PagerDuty Integration
  # ==========================================================================
  PAGERDUTY_ROUTING_KEY: ""
  
  # ==========================================================================
  # Twilio Integration
  # ==========================================================================
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_FROM_NUMBER: ""
  
  # ==========================================================================
  # Email (SMTP)
  # ==========================================================================
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  SMTP_FROM_ADDRESS: ""
  
  # ==========================================================================
  # LLM Provider API Keys (for Scanner)
  # ==========================================================================
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  
  # ==========================================================================
  # Vulnerability Database APIs
  # ==========================================================================
  NVD_API_KEY: ""
  
  # ==========================================================================
  # On-Premise License (if applicable)
  # ==========================================================================
  LICENSE_KEY: ""

---
# =============================================================================
# Docker Registry Secret (for private images)
# =============================================================================
# Create with:
# kubectl create secret docker-registry verityflux-registry \
#   --docker-server=<registry-url> \
#   --docker-username=<username> \
#   --docker-password=<password> \
#   --docker-email=<email> \
#   -n verityflux
---
apiVersion: v1
kind: Secret
metadata:
  name: verityflux-registry
  namespace: verityflux
  labels:
    app.kubernetes.io/name: verityflux
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6e319  # Empty placeholder - replace with actual registry credentials
